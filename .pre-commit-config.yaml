# pre-commit フレームワーク用の設定。
#
# 有効化方法（任意）:
#   pip install pre-commit
#   pre-commit install
#
# このリポジトリでは pre-commit フレームワークが未導入でも、
# `bash tools/install_hooks.sh` で同等の hook を .git/hooks/ に直書きする。
#
# 対応シナリオ: B2 / C4

repos:
  - repo: local
    hooks:
      - id: verify-module-docstrings
        name: モジュール docstring drift 検出（A2 / B1）
        entry: python3 tools/verify_module_docstrings.py src/ --skip-missing-docstring
        language: system
        pass_filenames: false
        always_run: true

      - id: verify-cj-cjob
        name: CJ ID リンク健全性 + CJ→CJob カテゴリ整合（C1 / C2）
        entry: python3 tools/verify_cj_cjob.py
        language: system
        pass_filenames: false
        always_run: true

      - id: verify-scene-cj-map
        name: scene_to_cj 対応表の健全性（C3 verify-only）
        entry: python3 tools/scene_to_cj.py --verify-only
        language: system
        pass_filenames: false
        always_run: true
