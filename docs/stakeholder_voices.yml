    - id: acc_map_roads_match_runtime
      status: active
      requirement_id: req_map_roads_match_runtime
      priority: p1
      source_trace_refs:
        - customer_journeys:CJ02
        - product_requirements_map:CJG02
      summary: 置いた道の形と通り方が runtime と一致する
      given: 子どもが Tilemap で道を連続して配置した
      when: Run してゲーム内でその道を歩く
      then:
