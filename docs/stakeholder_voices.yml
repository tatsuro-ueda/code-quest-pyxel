meta:
  document_id: stakeholder_voices
  version: 1
  status: draft
  intent:
    - stakeholder requirement catalog for task notes
    - AI-editable source of truth for request to requirement translation
    - checker fixer repair input

facts:
  stakeholders:
    - id: st_parent_customer
      type: customer
      label: 親
      status: active

    - id: st_child_user
      type: user
      label: 子ども
      status: active

    - id: st_friend_user
      type: user
      label: 友達
      status: active

    - id: st_repo_developer
      type: developer
      label: Developer
      status: active

    - id: st_coding_ai
      type: ai
      label: AI
      status: active

    - id: st_product_executive
      type: executive
      label: 経営者
      status: active

    - id: st_growth_marketer
      type: marketer
      label: マーケッター
      status: active

  requests:
    - id: rq_child_edit_ownership
      stakeholder_id: st_child_user
      status: active
      summary: Code Maker で触った内容がそのままゲームに出てほしい
      source_refs:
        - AGENTS.md
        - docs/customer-jobs.md
        - docs/customer-journeys.md
      source_trace_refs:
        - customer_jobs:JOB:JCR_CHILD_CREATOR
        - customer_journeys:CJ23
        - product_requirements_platform:CJG23

    - id: rq_parent_fast_feedback
      stakeholder_id: st_parent_customer
      status: active
      summary: 子どもの熱が冷める前に要望を試したい
      source_refs:
        - docs/customer-jobs.md
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_jobs:JOB:JPA_PARENT_ROOT
        - customer_jobs:JOB:JRE_PARENT_PROGRESS
        - customer_journeys:CJ22
        - product_requirements_platform:CJG22

    - id: rq_child_decision_power
      stakeholder_id: st_child_user
      status: active
      summary: 親や AI ではなく自分で採否を決めたい
      source_refs:
        - docs/customer-jobs.md
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_jobs:JOB:JCT_CHILD_CRITIC
        - customer_journeys:CJ31
        - customer_journeys:CJ32
        - customer_journeys:CJ33
        - customer_journeys:CJ34
        - product_requirements_platform:CJG31
        - product_requirements_platform:CJG32
        - product_requirements_platform:CJG33
        - product_requirements_platform:CJG34

    - id: rq_friend_zero_install
      stakeholder_id: st_friend_user
      status: active
      summary: URL を開くだけでスマホから遊びたい
      source_refs:
        - docs/customer-jobs.md
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_jobs:JOB:JFR_FRIEND_LOW_FRICTION
        - customer_journeys:CJ21
        - product_requirements_platform:CJG21

    - id: rq_parent_usage_visibility
      stakeholder_id: st_parent_customer
      status: active
      summary: 実際に遊ばれたかを公開環境で確認したい
      source_refs:
        - docs/customer-jobs.md
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_jobs:JOB:JRE_PARENT_PROGRESS
        - customer_jobs:JOB:JUN_PARENT_UNDERSTANDING
        - customer_journeys:CJ43
        - product_requirements_platform:CJG43

    - id: rq_developer_safe_boundaries
      stakeholder_id: st_repo_developer
      status: active
      summary: 責務境界を守って狭い範囲で直したい
      source_refs:
        - docs/architecture_rules.yml
        - docs/framework-rule.md
        - docs/product-requirements-guardrails.md
      source_trace_refs:
        - customer_journeys:CJ37
        - customer_journeys:CJ44
        - framework_rule:M1
        - framework_rule:M2
        - framework_rule:M3
        - framework_rule:M4
        - framework_rule:M5
        - product_requirements_guardrails:CJG37

    - id: rq_ai_small_safe_surface
      stakeholder_id: st_coding_ai
      status: active
      summary: affected path と verification をすぐ特定したい
      source_refs:
        - docs/architecture_rules.yml
        - docs/framework-rule.md
        - docs/product-requirements-guardrails.md
      source_trace_refs:
        - customer_journeys:CJ37
        - customer_journeys:CJ44
        - framework_rule:M1
        - framework_rule:M2
        - framework_rule:M3
        - framework_rule:M4
        - framework_rule:M5
        - product_requirements_guardrails:CJG37

    - id: rq_executive_real_done_only
      stakeholder_id: st_product_executive
      status: active
      summary: 動いて届く状態だけを done にしたい
      source_refs:
        - AGENTS.md
        - docs/architecture_rules.yml
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_journeys:CJ41
        - framework_rule:Golden Path Test
        - framework_rule:No Silent Failure
        - product_requirements_guardrails:CJG41

    - id: rq_marketer_easy_share
      stakeholder_id: st_growth_marketer
      status: active
      summary: 共有の摩擦を小さくしたい
      source_refs:
        - docs/customer-jobs.md
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md
      source_trace_refs:
        - customer_jobs:JOB:JFR_FRIEND_LOW_FRICTION
        - customer_jobs:JOB:JSC_CHILD_SOCIAL
        - customer_journeys:CJ21
        - customer_journeys:CJ43
        - product_requirements_platform:CJG21
        - product_requirements_platform:CJG43

  source_documents:
    - id: customer_jobs
      path: docs/customer-jobs.md
      extraction:
        regex:
          - 'JOB:[A-Z0-9_]+'

    - id: customer_journeys
      path: docs/customer-journeys.md
      extraction:
        regex:
          - '\bCJ\d+\b'

    - id: product_requirements_map
      path: docs/product-requirements-map.md
      extraction:
        regex:
          - '\bCJG\d+\b'

    - id: product_requirements_battle
      path: docs/product-requirements-battle.md
      extraction:
        regex:
          - '\bCJG\d+\b'

    - id: product_requirements_platform
      path: docs/product-requirements-platform.md
      extraction:
        regex:
          - '\bCJG\d+\b'

    - id: product_requirements_guardrails
      path: docs/product-requirements-guardrails.md
      extraction:
        regex:
          - '\bCJG\d+\b'

    - id: framework_rule
      path: docs/framework-rule.md
      extraction:
        regex:
          - '\bM[1-5]\b'
        literals:
          - SSoT
          - Golden Path Test
          - No Silent Failure

  requirements:
    - id: req_codemaker_primary_editor
      status: active
      kind: product_guardrail
      priority: p0
      derived_from_request_ids:
        - rq_child_edit_ownership
      acceptance_ids:
        - acc_codemaker_primary_editor_roundtrip
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ23
        - framework_rule:SSoT
        - product_requirements_platform:CJG23
      summary: 子ども向け編集対象では Code Maker を正式な編集面として扱う
      must:
        - tilemap sprite sound pyxres の編集面では Code Maker を最初の正として扱う
      must_not:
        - 内部都合で Code Maker を不要化 脇役化 置換しない
      affected_paths:
        - dist/
        - src/shared/services/image_banks.py
        - tools/build_codemaker.py
        - tools/codemaker_bundler.py
        - tools/probe_codemaker_layout.py
      verification_refs:
        - docs/architecture_rules.yml
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      source_refs:
        - AGENTS.md
        - docs/architecture_rules.yml
        - docs/product-requirements-platform.md

    - id: req_fast_feedback_loop
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_fast_feedback_loop_replay
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ22
        - product_requirements_platform:CJG22
      summary: 要望から再プレイまでを短時間で回す
      must:
        - 変更後に短時間で再確認できる
      must_not:
        - 子どもの集中が切れるほど待たせない
      affected_paths:
        - src/
        - tools/build_codemaker.py
        - tools/build_web_release.py
        - tools/test_headless.py
        - tools/test_web_compat.py
      verification_refs:
        - tools/build_codemaker.py
        - tools/build_web_release.py
        - tools/test_headless.py
        - tools/test_web_compat.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md

    - id: req_map_first_tile_visible
      status: active
      kind: experience
      priority: p0
      derived_from_request_ids:
        - rq_child_edit_ownership
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_map_first_tile_visible_roundtrip
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ01
        - product_requirements_map:CJG01
      summary: 子どもが置いた最初のタイルはすぐ見えてそのまま遊べる
      must:
        - Tilemap で置いた 1 マスの変化がすぐ見える
        - Run するとその変化がゲーム内にも反映される
      must_not:
        - クリックしても何も起きないように見せない
        - 実行時だけ別の地形へ補正しない
      affected_paths:
        - dist/
        - src/shared/constants/tile_data.py
        - src/shared/services/image_banks.py
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_roads_match_runtime
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_map_roads_match_runtime
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ02
        - product_requirements_map:CJG02
      summary: 子どもが置いた道は見た目も通り方もそのまま世界になる
      must:
        - エディタで見えた道の形がゲームでも一致する
        - 道として置いた場所は続けて歩ける
      must_not:
        - 見た目は道なのに歩けない状態を作らない
        - 実行時だけ道の形を別物へ補正しない
      affected_paths:
        - src/scenes/explore/model.py
        - src/shared/constants/tile_data.py
        - src/shared/services/image_banks.py
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_forest_blocks_cleanly
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_map_forest_blocks_cleanly
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ03
        - product_requirements_map:CJG03
      summary: 森は見た目どおりに通れない場所と通れる隙間を伝える
      must:
        - 木を密集させると通行不可エリアになる
        - 隙間として残した草地は歩ける
      must_not:
        - 見た目だけ森で歩けてしまう状態にしない
      affected_paths:
        - src/scenes/explore/model.py
        - src/shared/constants/tile_data.py
        - src/shared/services/world_generation.py
        - tools/build_codemaker.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_water_shape_readable
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_map_water_shape_readable
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ04
        - product_requirements_map:CJG04
      summary: 水と岸はひと目で分かる湖として見え、通れない
      must:
        - 水タイルは水として見えて通れない
        - 岸と組み合わせて湖としてまとまって見える
      must_not:
        - 水なのに歩ける状態を作らない
      affected_paths:
        - src/scenes/explore/view.py
        - src/shared/constants/tile_data.py
        - src/shared/services/image_banks.py
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
        - tools/probe_codemaker_layout.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_decorations_preserve_walkability
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
      acceptance_ids:
        - acc_map_decorations_preserve_walkability
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ05
        - product_requirements_map:CJG05
      summary: 装飾は世界をにぎやかにしても歩きやすさを壊さない
      must:
        - 装飾で見た目の個性を増やせる
        - 装飾を置いても基本の通行性を壊さない
      must_not:
        - 花や岩を置いただけで急に通れなくしない
      affected_paths:
        - src/scenes/explore/model.py
        - src/shared/constants/tile_data.py
        - src/shared/services/world_generation.py
        - tools/build_codemaker.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_maze_playtestable
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
        - rq_parent_fast_feedback
      acceptance_ids:
        - acc_map_maze_playtestable
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ06
        - product_requirements_map:CJG06
      summary: 迷路は壁と道の役割が分かれ、自分で解いて確かめられる
      must:
        - 壁と道の役割が見た目どおりに分かれる
        - 子どもが入口から出口まで自分で確かめられる
      must_not:
        - 壁なのに抜けられる あるいは道なのに進めない状態を作らない
      affected_paths:
        - src/scenes/explore/model.py
        - src/scenes/explore/presenter.py
        - src/shared/constants/tile_data.py
        - tools/build_codemaker.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_map_landmarks_stay_special
      status: active
      kind: experience
      priority: p1
      derived_from_request_ids:
        - rq_child_edit_ownership
      acceptance_ids:
        - acc_map_landmarks_stay_special
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ07
        - product_requirements_map:CJG07
      summary: ランドマークは特別な場所として正しい形で置けて触れる
      must:
        - 大きいランドマークが正しい形で置ける
        - ランドマークは乗る場所ではなく触る場所として伝わる
      must_not:
        - 既存の拠点やランドマークと重ねて意味を壊さない
      affected_paths:
        - src/scenes/explore/presenter.py
        - src/shared/constants/tile_data.py
        - src/shared/services/landmark_events.py
        - tools/build_codemaker.py
      verification_refs:
        - docs/product-requirements-map.md
        - tools/build_codemaker.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-map.md

    - id: req_child_keeps_decision_power
      status: active
      kind: experience
      priority: p0
      derived_from_request_ids:
        - rq_child_decision_power
      acceptance_ids:
        - acc_child_keeps_decision_power_review
      stakeholder_ids:
        - st_child_user
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ31
        - customer_journeys:CJ32
        - customer_journeys:CJ33
        - customer_journeys:CJ34
        - product_requirements_platform:CJG31
        - product_requirements_platform:CJG32
        - product_requirements_platform:CJG33
        - product_requirements_platform:CJG34
      summary: 開発版の採否は子どもが体感差で決める
      must:
        - 子どもが承認 却下 巻き戻しを判断できる
        - 承認前の開発版は本番へ自動昇格しない
      must_not:
        - 親や AI の都合で一括反映しない
      affected_paths:
        - dist/
        - index.html
        - tools/build_web_release.py
        - tools/render_release_selector.py
      verification_refs:
        - docs/product-requirements-platform.md
        - tools/build_web_release.py
        - tools/test_web_compat.py
      source_refs:
        - docs/customer-journeys.md
        - docs/product-requirements-platform.md

    - id: req_url_share_no_install
      status: active
      kind: distribution
      priority: p1
      derived_from_request_ids:
        - rq_friend_zero_install
        - rq_marketer_easy_share
      acceptance_ids:
        - acc_url_share_no_install_browser
      stakeholder_ids:
        - st_friend_user
        - st_growth_marketer
      source_trace_refs:
        - customer_journeys:CJ21
        - product_requirements_platform:CJG21
      summary: URL だけでブラウザから遊べる
      must:
        - ブラウザからプレイできる
      must_not:
        - インストール ダウンロード 会員登録 ログインを前提にしない
      affected_paths:
        - dist/
        - index.html
        - tools/build_web_release.py
        - tools/web_runtime_server.py
      verification_refs:
        - docs/product-requirements-platform.md
        - tools/build_web_release.py
        - tools/test_web_compat.py
      source_refs:
        - docs/product-requirements-platform.md

    - id: req_phone_fullscreen_playable
      status: active
      kind: distribution
      priority: p1
      derived_from_request_ids:
        - rq_friend_zero_install
        - rq_marketer_easy_share
      acceptance_ids:
        - acc_phone_fullscreen_playable_mobile
      stakeholder_ids:
        - st_friend_user
        - st_growth_marketer
      source_trace_refs:
        - customer_journeys:CJ21
        - product_requirements_platform:CJG21
      summary: スマホでも全画面で遊びやすい
      must:
        - スマホで全画面プレイできる
      must_not:
        - スマホ導線を PC 前提の UI にしない
      affected_paths:
        - dist/
        - index.html
        - tools/build_web_release.py
      verification_refs:
        - docs/product-requirements-platform.md
        - tools/build_web_release.py
        - tools/test_web_compat.py
      source_refs:
        - docs/product-requirements-platform.md

    - id: req_public_play_session_visible
      status: active
      kind: visibility
      priority: p1
      derived_from_request_ids:
        - rq_marketer_easy_share
        - rq_parent_usage_visibility
      acceptance_ids:
        - acc_public_play_session_visible_logs
      stakeholder_ids:
        - st_growth_marketer
        - st_parent_customer
      source_trace_refs:
        - customer_journeys:CJ43
        - product_requirements_platform:CJG43
      summary: 実公開で遊ばれた記録が見える
      must:
        - 公開 URL で遊ばれた記録を確認できる
      must_not:
        - 静的配信だけで記録されない状態を done 扱いしない
      affected_paths:
        - dist/
        - tools/report_play_sessions.py
        - tools/web_runtime_server.py
      verification_refs:
        - docs/product-requirements-platform.md
        - tools/report_play_sessions.py
        - tools/web_runtime_server.py
      source_refs:
        - docs/product-requirements-platform.md

    - id: req_safe_architecture_boundaries
      status: active
      kind: engineering_guardrail
      priority: p0
      derived_from_request_ids:
        - rq_ai_small_safe_surface
        - rq_developer_safe_boundaries
      acceptance_ids:
        - acc_safe_architecture_boundaries_guard
      stakeholder_ids:
        - st_coding_ai
        - st_repo_developer
      source_trace_refs:
        - customer_journeys:CJ37
        - customer_journeys:CJ44
        - framework_rule:M1
        - framework_rule:M2
        - framework_rule:M3
        - framework_rule:M4
        - framework_rule:M5
        - product_requirements_guardrails:CJG37
      summary: AI と開発者が責務境界を越えずに変更できる
      must:
        - 責務境界を static に検査できる
      must_not:
        - 暗黙依存で広範囲破壊を起こさない
      affected_paths:
        - src/
        - test/test_architecture_layout.py
        - test/test_cjg_framework_rule_guards.py
        - tools/check_architecture_rules.py
      verification_refs:
        - test/test_architecture_layout.py
        - test/test_cjg_framework_rule_guards.py
        - tools/check_architecture_rules.py
      source_refs:
        - docs/architecture_rules.yml
        - docs/framework-rule.md
        - docs/product-requirements-guardrails.md

    - id: req_no_silent_failure
      status: active
      kind: engineering_guardrail
      priority: p0
      derived_from_request_ids:
