  tasknote_contracts:
    note_glob: steering/*.md
    opt_in_frontmatter_key: requirement_ids
    required_frontmatter_keys:
      - acceptance_ids
      - affected_paths
      - done_checks
      - requirement_ids
      - stakeholder_ids
      - verification_refs

validation_rules:
  - id: id_uniqueness
    summary: stakeholder request requirement rule ids are unique
    severity: error
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - id_uniqueness
    message: stakeholder voice ids may be duplicated
    suggested_actions:
      - rename the duplicated ids so each logical item has one stable key
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: duplicate ids are fully machine-detectable but renaming needs human intent

  - id: stakeholder_reference_integrity
    summary: stakeholder references resolve from requests and requirements
    severity: error
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - stakeholder_reference_integrity
    message: stakeholder references may be broken
    suggested_actions:
      - add the missing stakeholder definitions or fix the referenced stakeholder ids
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: referential integrity is fully machine-detectable but missing intent cannot be autofixed

  - id: request_reference_integrity
    summary: requirement request references resolve
    severity: error
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - request_reference_integrity
    message: requirement request references may be broken
    suggested_actions:
      - add the missing request definitions or fix derived_from_request_ids
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: missing request ids are easy to detect but not safe to invent automatically

  - id: requirement_has_code_hints
    summary: active requirements keep code and verification hints
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - requirement_has_code_hints
    message: requirement may be missing code hints
    suggested_actions:
      - add affected_paths verification_refs and source_refs for each active requirement
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: presence checks are machine-detectable but the right hints need human judgment

  - id: requirement_acceptance_integrity
    summary: active P0 P1 requirements link to acceptance scenarios with gherkin fields
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - requirement_acceptance_integrity
    message: requirement acceptance links may be missing or incomplete
    suggested_actions:
      - add acceptance_ids for each active P0 P1 requirement
      - add acceptance entries with requirement_id given when then
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: acceptance linkage and gherkin field presence are machine-detectable but scenario content is not safe to invent

  - id: acceptance_has_verification
    summary: acceptance scenarios stay verifiable and distinguish manual vs deterministic checks
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - acceptance_has_verification
    message: acceptance verification may be missing or invalid
    suggested_actions:
      - add verification.mode as manual or deterministic
      - add verification.refs with at least one live path
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: verification structure is deterministic to inspect but choosing the right proof remains a human design decision

  - id: source_traceability_integrity
    summary: active request requirement acceptance trace refs resolve to known docs and live stable ids
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - source_traceability_integrity
    message: structured source trace refs may be missing or broken
    suggested_actions:
      - add source_documents entries for stable-id docs
      - add or fix source_trace_refs in doc_id:stable_ref format
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: doc ids and stable ref token presence are deterministic to inspect, but choosing the right source trace remains a human judgment

  - id: referenced_paths_exist
    summary: referenced paths exist for requirements and acceptance verification refs
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
        - steering/
    evidence:
      checks:
        - referenced_paths_exist
    message: referenced code or docs paths may be stale
    suggested_actions:
      - update affected_paths verification_refs source_refs or acceptance verification refs to live paths
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: path existence is deterministic but replacement paths need human intent

  - id: tasknote_frontmatter_integrity
    summary: opt-in task notes keep required frontmatter keys and resolvable requirement stakeholder acceptance ids
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - steering/
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - tasknote_frontmatter_integrity
    message: task note frontmatter may have drifted from stakeholder voice contracts
    suggested_actions:
      - add the required frontmatter keys and fix unresolved requirement stakeholder or acceptance ids
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/check_stakeholder_voices.py
      repair_autofix: not_recommended
      rationale: required keys and id resolution are deterministic once notes opt in

  - id: normalized_requirement_lists
    summary: requirement id and path lists stay sorted and unique
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - docs/stakeholder_voices.yml
    evidence:
      checks:
        - normalized_requirement_lists
    message: requirement lists may need normalization
    suggested_actions:
      - sort and deduplicate requirement id and path lists
    coverage:
      deterministic_review: implemented
      next_checker_unit: tools/stakeholder_voices/fix_stakeholder_voices.py
      repair_autofix: implemented
      rationale: sorting and deduplication are safe deterministic edits
