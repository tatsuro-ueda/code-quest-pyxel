meta:
  document_id: architecture_rules
  version: 1
  status: draft
  intended_replacement_for:
    - docs/architecture.md
  replacement_status: staged_migration
  audiences:
    - ai
    - human
  intent:
    - アーキテクチャの正本候補
    - 人が読みやすい
    - checker が読みやすい

facts:
  principles:

    - id: code_maker_primary_editor
      summary: Pyxel Code Maker は子どもの正式な編集面である。
      must:
        - tilemap / sprite / sound / .pyxres の編集面では Code Maker を最初の正として扱わなければならない
      must_not:
        - 内部都合で Code Maker を不要化したり脇役化したりしてはならない

    - id: docs_are_requirements
      summary: docs と code が食い違ったら未実装 / バグ / 仕様ずれとして扱う。
      must:
        - code ではなく docs に書かれた要求との差分を明記しなければならない
      must_not:
        - code があるから正しいと考えてはならない

    - id: pyxres_source_of_truth
      summary: .pyxres は子どもと親が Code Maker で編集する正本である。
      must:
        - AI は code / build / packaging / guardrail / test を整えなければならない
        - pyxel resource 実体を確認するときは実物を最初の正として扱わなければならない
      must_not:
        - AI が .pyxres の中身をテキスト編集の主戦場にしてはならない

    - id: dist_is_distribution
      summary: dist は配布物の置き場であり source ではない。
      must:
        - source の修正は src / assets / tools / docs 側で行わなければならない
      must_not:
        - dist 配下を手修正の正本にしてはならない

    - id: done_requires_real_artifacts
      summary: done はコード・テスト・実物確認を含む。
      must:
        - zip / .pyxres / HTML / save data / 実行画面の実物確認を行わなければならない
      must_not:
        - runtime code や build script を直しただけで完了扱いにしてはならない

  tree:
    path: .
    kind: root
    role: repository_root
    status: active
    summary: Block Quest Pyxel repository root
    children:

      - path: index.html
        kind: file
        id: top_page
        role: child_facing_top_page
        status: active
        source_of_truth: false
        summary: 子ども向けトップページ。プレイ導線を担う

      - path: main.py
        kind: file
        id: runtime_main_wrapper
        role: wrapper
        status: active
        source_of_truth: false
        summary: src/runtime/main_runtime.py を実行する 8 行 wrapper

      - path: src
        kind: directory
        children:

          - path: src/runtime
            kind: directory
            children:

              - path: src/runtime/main_runtime.py
                kind: file
                id: runtime_shim
                role: shim
                status: active
                summary: test / Code Maker bundler 互換のための re-export shim
                source_of_truth: true

              - path: src/runtime/app.py
                kind: file
                id: runtime_game
                symbol: Game
                role: application_root
                status: active
                summary: pyxel 初期化、DI、scene/service 組み立て、update/draw dispatcher
                source_of_truth: true
                responsibilities:
                  - pyxel.init と font の初期化
                  - SfxSystem / ImageBanks / GameState / PlayerModel / SceneManager / DebugService
                    / scene 群の組み立て
                  - 現在 scene の update / draw dispatch
                property_forwards:
                  - property: current_town
                    target: GameState.current_town
                  - property: debug_mode
                    target: DebugService.mode
                  - property: debug_seq
                    target: DebugService.seq
                  - property: state
                    target: SceneManager.current
                  - property: prev_state
                    target: SceneManager.previous
                must_not_store:
                  - current_bgm
                  - duplicated_scene_state

          - path: src/app.py
            kind: file
            id: blockquestapp_legacy_shell
            symbol: BlockQuestApp
            status: legacy
            summary: Phase 1 由来の薄い実行シェル。test / Code Maker bundler 互換のため残置
            role: legacy_runtime_shell
            source_of_truth: true

          - path: src/core
            kind: directory
            children:

              - path: src/core/scene_manager.py
                kind: file
