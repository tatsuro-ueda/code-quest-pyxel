meta:
  document_id: architecture_rules
  version: 1
  status: draft
  replaces:
    - docs/architecture.md
  audiences:
    - ai
    - human
  intent:
    - architecture_source_of_truth
    - human_reviewable
    - checker_readable

facts:
  principles:
    - id: code_maker_primary_editor
      summary: Pyxel Code Maker は子どもの正式な編集面である。
      must:
        - tilemap / sprite / sound / .pyxres の編集面では Code Maker を最初の正として扱う
      must_not:
        - 内部都合で Code Maker を不要化・脇役化しない
    - id: docs_are_requirements
      summary: docs と code が食い違ったら未実装 / バグ / 仕様ずれとして扱う。
      must:
        - code ではなく docs に書かれた要求との差分を明記する
      must_not:
        - code があるから正しいと考えない
    - id: pyxres_source_of_truth
      summary: .pyxres は子どもと親が Code Maker で編集する正本である。
      must:
        - AI は code / build / packaging / guardrail / test を整える
        - pyxel resource 実体を確認するときは実物を最初の正として扱う
      must_not:
        - AI が .pyxres の中身をテキスト編集の主戦場にしない
    - id: dist_is_distribution
      summary: dist は配布物の置き場であり source ではない。
      must:
        - source の修正は src / assets / tools / docs 側で行う
      must_not:
        - dist 配下を手修正の正本にしない
    - id: done_requires_real_artifacts
      summary: done はコード・テスト・実物確認を含む。
      must:
        - zip / .pyxres / HTML / save data / 実行画面の実物確認を行う
      must_not:
        - runtime code や build script を直しただけで完了扱いにしない
  repository:
    roots:
      - id: top_page
        path: index.html
        role: child_facing_top_page
        status: active
        source_of_truth: false
        summary: 子ども向けトップページ。プレイ導線を担う
      - id: main_wrapper
        path: main.py
        role: runtime_wrapper
        status: active
        source_of_truth: false
        summary: src/runtime/main_runtime.py を呼ぶ薄い wrapper
      - id: src_root
        path: src
        role: source_root
        status: active
        source_of_truth: true
        summary: アプリケーションコードの正本
      - id: assets_root
        path: assets
        role: human_edited_assets
        status: active
        source_of_truth: true
        summary: YAML / .pyxres / font / screenshot など人が直す正本
      - id: tools_root
        path: tools
        role: build_and_verification
        status: active
        source_of_truth: false
        summary: build / 配布 / データ生成 / 検証スクリプト
      - id: test_root
        path: test
        role: automated_tests
        status: active
        source_of_truth: false
        summary: pytest テスト群
      - id: templates_root
        path: templates
        role: build_templates
        status: active
        source_of_truth: false
        summary: build 前の HTML template
      - id: dist_root
        path: dist
        role: distribution_root
        status: distribution
        source_of_truth: false
        summary: 承認済み配布物の出力先
      - id: steering_root
        path: steering
        role: task_notes
        status: active
        source_of_truth: false
        summary: task note と作業判断の記録
      - id: docs_root
        path: docs
        role: architecture_and_requirements
        status: active
        source_of_truth: true
        summary: AI / 人間向けの要求・規約・構成定義
  data_flows:
    - id: generated_game_data
      summary: 人が編集する YAML は tools/gen_data.py を通って generated module へ変換される
      steps:
        - assets/*.yaml
        - tools/gen_data.py
        - src/generated/*.py
        - src/game_data.py
        - runtime
    - id: pyxres_roundtrip
      summary: 子どもが編集する pyxres は Code Maker と配布 zip を通って assets に戻る
      steps:
        - assets/blockquest.pyxres
        - dist/code-maker.zip
        - Pyxel Code Maker
        - assets/blockquest.pyxres
    - id: pyxres_runtime_loading
      summary: runtime は assets の pyxres を読み込み、ImageBanks はロード / 保存 / fallback を担う
      steps:
        - assets/blockquest.pyxres
        - src/shared/services/image_banks.py
        - runtime
  runtime:
    entry_chain:
      - id: runtime_main_wrapper
        path: main.py
        role: wrapper
        status: active
        summary: src/runtime/main_runtime.py を実行する 8 行 wrapper
      - id: runtime_shim
        path: src/runtime/main_runtime.py
        role: shim
        status: active
        summary: test / Code Maker bundler 互換のための re-export shim
      - id: runtime_game
        path: src/runtime/app.py
        symbol: Game
        role: application_root
        status: active
        summary: pyxel 初期化、DI、scene/service 組み立て、update/draw dispatcher
    game_responsibilities:
      - pyxel.init と font の初期化
      - SfxSystem / ImageBanks / GameState / PlayerModel / SceneManager / DebugService / scene 群の組み立て
      - 現在 scene の update / draw dispatch
    property_forwards:
      - property: current_town
        target: GameState.current_town
      - property: debug_mode
        target: DebugService.mode
      - property: debug_seq
        target: DebugService.seq
      - property: state
        target: SceneManager.current
      - property: prev_state
        target: SceneManager.previous
    must_not_store:
      - current_bgm
      - duplicated_scene_state
  scenes:
    - id: splash_scene
      path: src/scenes/splash
      status: active
      responsibility: 起動スプラッシュ
      local_state:
        - frame
    - id: title_scene
      path: src/scenes/title
      status: active
      responsibility: タイトル画面
      local_state:
        - cursor
    - id: explore_scene
      path: src/scenes/explore
      status: active
      responsibility: フィールド / ダンジョン歩行
      local_state:
        - mode
        - walk_frame
        - walk_timer
        - move_cooldown
        - a_cooldown
        - image_banks
        - cam_x
        - cam_y
    - id: town_scene
      path: src/scenes/town
      status: active
      responsibility: 町メニュー
      local_state:
        - menu_cursor
        - menu_pos
    - id: shop_scene
      path: src/scenes/shop
      status: active
      responsibility: 武器・防具・道具の売買
      local_state:
        - kind
        - inventory
        - cursor
        - message
    - id: battle_scene
      path: src/scenes/battle
      status: active
      responsibility: 戦闘全体
      local_state:
        - enemy
        - enemy_hp
        - menu
        - phase
        - text
        - text_timer
        - item_select
        - spell_select
        - is_glitch_lord
        - is_professor
        - boss_phase
        - noise_guardian
    - id: menu_scene
      path: src/scenes/menu
      status: active
      responsibility: メニュー画面
      local_state:
        - cursor
        - sub
        - item_cursor
        - message
    - id: ai_help_scene
      path: src/scenes/ai_help
      status: active
      responsibility: Glitch Lord 戦の AI ヘルプ
      local_state:
        - status
    - id: professor_scene
      path: src/scenes/professor
      status: active
      responsibility: Professor 戦 intro / ending
      local_state:
        - choice_active
        - choice_cursor
        - intro_idx
        - intro_lines
        - ending_idx
        - ending_lines
    - id: ending_scene
      path: src/scenes/ending
      status: active
      responsibility: エンディング
      local_state:
        - lines
    - id: settings_scene
      path: null
      status: removed
      responsibility: 演出 ON/OFF UI
      local_state: []
      notes:
        - 2026-05-07 改訂で撤去済
  shared:
    services:
      - id: game_state_service
        path: src/shared/services/game_state.py
        role: shared_state_aggregate
        status: active
        summary: scene 間共有 state を集約する
      - id: scene_manager_service
        path: src/shared/services/scene_manager.py
        role: scene_state_holder
        status: active
        summary: current / previous の 2 値 state holder
      - id: debug_service
        path: src/shared/services/debug_service.py
        role: debug_state
        status: active
        summary: debug mode / seq / UUDD を扱う
      - id: audio_system_service
        path: src/shared/services/audio_system.py
        role: audio_bridge
        status: active
        summary: SFX 再生と冪等 BGM 再生命令
      - id: image_banks_service
        path: src/shared/services/image_banks.py
        role: pyxres_bridge
        status: active
        summary: pyxres のロード / 保存 / fallback 書き戻し
      - id: dialog_runner_service
        path: src/shared/services/dialog_runner.py
        role: structured_dialog
        status: active
        summary: YAML ドリブン会話
      - id: message_display_service
        path: src/shared/services/message_display.py
        role: overlay_messages
        status: active
        summary: 短メッセージ overlay
      - id: input_bindings_service
        path: src/shared/services/input_bindings.py
        role: input_snapshot
        status: active
        summary: 入力判定とフレーム差分
      - id: landmark_events_service
        path: src/shared/services/landmark_events.py
        role: coordinate_events
        status: active
        summary: 座標接触イベント
      - id: player_state_service
        path: src/shared/services/player_state.py
        role: legacy_player_snapshot
        status: legacy
        summary: snapshot helper。player の正本ではない
      - id: save_store_service
        path: src/shared/services/save_store.py
        role: save_backend_bridge
        status: active
        summary: save 先差分の吸収
      - id: world_generation_service
        path: src/shared/services/world_generation.py
        role: fallback_world_generation
        status: active
        summary: pyxres 不在時の fallback 生成
      - id: vfx_service
        path: src/shared/services/vfx.py
        role: visual_effects
        status: active
        summary: ダメージ等の視覚エフェクト
      - id: item_use_service
        path: src/shared/services/item_use.py
        role: item_logic
        status: active
        summary: アイテム使用ロジック
      - id: text_format_service
        path: src/shared/services/text_format.py
        role: text_formatting
        status: active
        summary: 表示名整形・翻訳
      - id: play_session_logging_service
        path: src/shared/services/play_session_logging.py
        role: play_logging
        status: active
        summary: Web プレイ記録の sqlite 永続化
      - id: codemaker_resource_store_service
        path: src/shared/services/codemaker_resource_store.py
        role: codemaker_zip_store
        status: active
        summary: Code Maker zip の採否・保管
    state:
      - id: player_model_state
        path: src/shared/state/player_model.py
        role: player_source_of_truth
        status: active
        summary: HP / MP / EXP / 装備 / 所持品 / 位置などの正本 model
    ui:
      - id: message_window_ui
        path: src/shared/ui/message_window.py
        role: message_window
        status: active
        summary: 短メッセージウィンドウ描画とページング表示
      - id: text_renderer_ui
        path: src/shared/ui/text_renderer.py
        role: text_renderer
        status: active
        summary: JP フォントを使う共通テキスト描画
      - id: status_bar_ui
        path: src/shared/ui/status_bar.py
        role: status_bar
        status: active
        summary: HP / MP / level / zone の status bar 描画
      - id: vfx_overlay_ui
        path: src/shared/ui/vfx_overlay.py
        role: vfx_overlay
        status: active
        summary: 全画面フラッシュ overlay 描画
    constants:
      - id: tile_data_constants
        path: src/shared/constants/tile_data.py
        role: tile_constants
        status: active
        summary: タイル定義と zone/path/shore variation
      - id: sprite_data_constants
        path: src/shared/constants/sprite_data.py
        role: sprite_constants
        status: active
        summary: HERO / ENEMY スプライトのピクセル配列
      - id: game_config_constants
        path: src/shared/constants/game_config.py
        role: game_config
        status: active
        summary: 画面サイズなどのゲーム設定
    assets:
      - id: jp_font_asset
        path: src/shared/assets/jp_font_data.py
        role: embedded_font_data
        status: active
        summary: 日本語ビットマップフォントデータ
  generated:
    entries:
      - id: generated_dialogue
        path: src/generated/dialogue.py
        status: generated
        generated_from:
          - assets/dialogue.yaml
      - id: generated_enemies
        path: src/generated/enemies.py
        status: generated
        generated_from:
          - assets/enemies.yaml
      - id: generated_items
        path: src/generated/items.py
        status: generated
        generated_from:
          - assets/items.yaml
      - id: generated_weapons
        path: src/generated/weapons.py
        status: generated
        generated_from:
          - assets/weapons.yaml
      - id: generated_armors
        path: src/generated/armors.py
        status: generated
        generated_from:
          - assets/armors.yaml
      - id: generated_spells
        path: src/generated/spells.py
        status: generated
        generated_from:
          - assets/spells.yaml
      - id: generated_shops
        path: src/generated/shops.py
        status: generated
        generated_from:
          - assets/shops.yaml
  distribution:
    artifacts:
      - id: codemaker_zip
        path: dist/code-maker.zip
        status: distribution
        summary: block-quest/main.py + my_resource.pyxres を梱包した教材版 zip
      - id: pyxel_html
        path: dist/pyxel.html
        status: distribution
        summary: Web 配布用 HTML
      - id: pyxel_pyxapp
        path: dist/pyxel.pyxapp
        status: distribution
        summary: Pyxel app 配布物
      - id: play_html
        path: dist/play.html
        status: distribution
        summary: プレイページ
      - id: top_index_html
        path: dist/index.html
        status: distribution
        summary: play.html と同内容の wrapper alias
  runbooks:
    - id: build_codemaker_zip
      summary: dist/code-maker.zip だけを再生成する
      steps:
        - command: python tools/build_codemaker.py
          outputs:
            - dist/code-maker.zip
          checks:
            - tools/codemaker_manifest.txt の順番で inline される
    - id: build_all_release_artifacts
      summary: dist 配下の release artifact を再生成する
      steps:
        - command: python tools/build_web_release.py
          outputs:
            - dist/code-maker.zip
            - dist/pyxel.html
            - dist/pyxel.pyxapp
            - dist/play.html
            - dist/index.html
          checks:
            - tools/build_release_artifacts.py が tools.build_codemaker を import できる
          common_failures:
            - python tools/build_release_artifacts.py を直接叩くと ModuleNotFoundError になる
    - id: post_change_release_sequence
      summary: BGM / pyxres / view / scene を変更した後の順序
      steps:
        - command: PYTHONPATH=. python -m pytest -x
        - command: python tools/build_web_release.py
        - command: python -c "import zipfile,re; z=zipfile.ZipFile('dist/code-maker.zip'); t=z.read('block-quest/main.py').decode('utf-8'); print('AudioManager:',len(re.findall(r'class AudioManager',t))); print('SettingsScene:',len(re.findall(r'class SettingsScene',t))); print('play_bgm_track:',len(re.findall(r'play_bgm_track\\(',t)))"
        - command: git status
  migration_notes:
    - id: blockquestapp_legacy_shell
      path: src/app.py
      symbol: BlockQuestApp
      status: legacy
      summary: Phase 1 由来の薄い実行シェル。test / Code Maker bundler 互換のため残置
    - id: core_scene_manager_legacy
      path: src/core/scene_manager.py
      symbol: SceneManager
      status: legacy
      summary: 旧 SceneManager。現在の Game は shared/services/scene_manager.py を使う
    - id: development_runtime_removed
      path: src/runtime/main_development_runtime.py
      status: removed
      summary: Phase 3 で削除済

validation_rules:
  - id: runtime_entry_chain
    summary: runtime の入口は wrapper -> shim -> Game の流れを保つ
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - main.py
        - src/runtime/main_runtime.py
        - src/runtime/app.py
    evidence:
      checks:
        - wrapper_chain_present
    message: runtime の入口構成が architecture 定義から外れている可能性があります
  - id: code_maker_primary_editor
    summary: Code Maker を子どもの正式な編集面として扱う
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - AGENTS.md
        - docs/architecture.md
        - docs/architecture_rules.yml
        - src
        - tools
    evidence:
      checks:
        - inspect_editor_replacement_risk
    message: Code Maker を脇役化する変更が入っている可能性があります
  - id: pyxres_source_of_truth
    summary: pyxres を正本として扱い、AI がテキスト編集の主戦場にしない
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - assets
        - src/shared/services/image_banks.py
        - docs/architecture_rules.yml
    evidence:
      checks:
        - inspect_pyxres_source_of_truth
    message: pyxres の正本性を崩す変更が入っている可能性があります
  - id: dist_not_source
    summary: dist を source の正本として扱わない
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - dist
        - docs/architecture_rules.yml
    evidence:
      checks:
        - distribution_paths_marked_non_source
    message: dist 配下が source のように扱われている可能性があります
  - id: generated_files_provenance
    summary: generated module が assets/*.yaml の入力元情報を持つことを確認する
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - src/generated
        - assets
        - tools/gen_data.py
    evidence:
      checks:
        - generated_entries_have_generated_from
    message: generated module の provenance 定義が欠けている可能性があります
  - id: scene_mvp_boundary
    summary: scene は MVP 境界を越えて責務を混在させない
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - src/scenes
    evidence:
      checks:
        - inspect_scene_boundary_against_mvp_roles
    message: scene の model / view / presenter / scene の責務境界が崩れている可能性があります
  - id: shared_service_vs_state_boundary
    summary: shared/services の service/state holder と shared/state の横断 model の配置が repo 方針と一致する
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - src/shared/services
        - src/shared/state
    evidence:
      checks:
        - inspect_shared_boundary_with_state_holders
    message: shared/services の state holder と shared/state の横断 model の境界が崩れている可能性があります
  - id: build_runbook_paths
    summary: build runbook は documented command と artifact path を維持する
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - Makefile
        - tools/build_codemaker.py
        - tools/build_web_release.py
        - tools/build_release_artifacts.py
        - docs/architecture.md
        - docs/architecture_rules.yml
    evidence:
      checks:
        - compare_runbook_commands_and_artifact_defs
    message: build runbook fact と build script / artifact 定義がずれている可能性があります
