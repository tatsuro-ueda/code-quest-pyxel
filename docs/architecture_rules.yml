  flows:

    - id: generated_game_data
      summary: 人が編集する YAML は tools/gen_data.py を通って generated module へ変換される
      steps:
        - assets/*.yaml
        - tools/gen_data.py
        - src/generated/*.py
        - src/game_data.py
        - runtime

    - id: pyxres_roundtrip
      summary: 子どもが編集する pyxres は Code Maker と配布 zip を通って assets に戻る
      steps:
        - assets/blockquest.pyxres
        - dist/code-maker.zip
        - Pyxel Code Maker
        - assets/blockquest.pyxres

    - id: pyxres_runtime_loading
      summary: runtime は assets の pyxres を読み込み、ImageBanks はロード / 保存 / fallback を担う
      steps:
        - assets/blockquest.pyxres
        - src/shared/services/image_banks.py
        - runtime

  entry_points:

    - id: runtime_entry_chain
      summary: runtime の入口は wrapper -> shim -> Game の流れを保つ
      paths:
        - main.py
        - src/runtime/main_runtime.py
        - src/runtime/app.py
      nodes:
        - id: runtime_main_wrapper
          path: main.py
          role: wrapper
          status: active
          summary: src/runtime/main_runtime.py を実行する 8 行 wrapper
        - id: runtime_shim
          path: src/runtime/main_runtime.py
          role: shim
          status: active
          summary: test / Code Maker bundler 互換のための re-export shim
        - id: runtime_game
          path: src/runtime/app.py
          symbol: Game
          role: application_root
          status: active
          summary: pyxel 初期化、DI、scene/service 組み立て、update/draw dispatcher

  runbooks:

    - id: build_codemaker_zip
      summary: dist/code-maker.zip だけを再生成する
      steps:
        - command: python tools/build_codemaker.py
          outputs:
            - dist/code-maker.zip
          checks:
            - tools/codemaker_manifest.txt の順番で inline される

    - id: build_all_release_artifacts
      summary: dist 配下の release artifact を再生成する
      steps:
        - command: python tools/build_web_release.py
          outputs:
            - dist/code-maker.zip
            - dist/pyxel.html
            - dist/pyxel.pyxapp
            - dist/play.html
            - dist/index.html
          checks:
            - tools/build_release_artifacts.py が tools.build_codemaker を import できる
          common_failures:
            - python tools/build_release_artifacts.py を直接叩くと ModuleNotFoundError になる

    - id: post_change_release_sequence
      summary: BGM / pyxres / view / scene を変更した後の順序
      steps:
        - command: PYTHONPATH=. python -m pytest -x
        - command: python tools/build_web_release.py
        - command: python -c "import zipfile,re; z=zipfile.ZipFile('dist/code-maker.zip');
            t=z.read('block-quest/main.py').decode('utf-8'); print('AudioManager:',len(re.findall(r'class
            AudioManager',t))); print('SettingsScene:',len(re.findall(r'class SettingsScene',t)));
            print('play_bgm_track:',len(re.findall(r'play_bgm_track\\(',t)))"
        - command: git status

  migration_notes:

    - id: blockquestapp_legacy_shell
      path: src/app.py
      symbol: BlockQuestApp
      status: legacy
      summary: Phase 1 由来の薄い実行シェル。test / Code Maker bundler 互換のため残置

    - id: core_scene_manager_legacy
      path: src/core/scene_manager.py
      symbol: SceneManager
      status: legacy
      summary: 旧 SceneManager。現在の Game は shared/services/scene_manager.py を使う

    - id: development_runtime_removed
      path: src/runtime/main_development_runtime.py
      status: removed
      summary: Phase 3 で削除済

validation_rules:

  - id: runtime_entry_chain
    summary: runtime の入口は wrapper -> shim -> Game の流れを保つ
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - main.py
        - src/runtime/main_runtime.py
        - src/runtime/app.py
    evidence:
      checks:
        - wrapper_chain_present
    message: runtime の入口構成が architecture 定義から外れている可能性があります
    suggested_actions:
      - facts.runtime.entry_chain の path / symbol と実コードの entry chain をそろえる
      - main.py, src/runtime/main_runtime.py, src/runtime/app.py の委譲関係を崩していないか確認する
    coverage:
      deterministic_review: implemented
      next_checker_unit: null
      guardian_autofix: implemented
      rationale: tree-first facts と実ファイル照合だけで判定でき、guardian も安全に正規形へ戻せる

  - id: code_maker_primary_editor
    summary: Code Maker を子どもの正式な編集面として扱う
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - AGENTS.md
        - docs/architecture.md
        - docs/architecture_rules.yml
        - src
        - tools
    evidence:
      checks:
        - inspect_editor_replacement_risk
    message: Code Maker を脇役化する変更が入っている可能性があります
    suggested_actions:
      - Code Maker を子どもの正式な編集面として扱う原則を AGENTS.md と docs に照らして確認する
      - tilemap / sprite / sound / .pyxres の編集面を別経路へ置き換える変更が混ざっていないか見直す
    coverage:
      deterministic_review: keep_llm_assisted
      next_checker_unit: null
      guardian_autofix: not_recommended
      rationale: 子ども向けの正式編集面を脇役化していないかは path だけでは判定できず、変更意図の読解が要る

  - id: pyxres_source_of_truth
    summary: pyxres を正本として扱い、AI がテキスト編集の主戦場にしない
    severity: warning
    enforcement:
      mode: manual
    scope:
      paths:
        - assets
        - src/shared/services/image_banks.py
        - docs/architecture_rules.yml
    evidence:
      checks:
        - inspect_pyxres_source_of_truth
    message: pyxres の正本性を崩す変更が入っている可能性があります
    suggested_actions:
      - assets/blockquest.pyxres と Code Maker を正本として扱う構成に戻す
      - AI が .pyxres を直接編集する前提になっていないか見直す
    coverage:
      deterministic_review: keep_manual
      next_checker_unit: null
      guardian_autofix: not_recommended
      rationale: 実物の pyxres と Code Maker roundtrip を見て判断すべきで、Python だけの自動修復は危険

  - id: dist_not_source
    summary: dist を source の正本として扱わない
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - dist
        - docs/architecture_rules.yml
    evidence:
      checks:
        - distribution_paths_marked_non_source
    message: dist 配下が source のように扱われている可能性があります
    suggested_actions:
      - facts.repository.roots の dist_root を status=distribution / source_of_truth=false にそろえる
      - source の修正先を src / assets / tools / docs 側へ戻す
    coverage:
      deterministic_review: implemented
      next_checker_unit: null
      guardian_autofix: implemented
      rationale: dist root と artifact node は facts.tree と実在 path だけで機械判定できる

  - id: generated_files_edit_policy
    summary: generated module は手編集禁止で、編集元が assets/*.yaml に固定されている
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - src/generated
        - assets
        - tools/gen_data.py
    evidence:
      checks:
        - generated_entries_mark_non_hand_editable_and_sources
    message: generated module の手編集禁止ポリシーまたは入力元定義が欠けている可能性があります
    suggested_actions:
      - src/generated 配下を手編集せず、assets/*.yaml を修正して tools/gen_data.py を実行する
      - facts.generated.entries の hand_editable と generated_from を実ファイル構成にそろえる
    coverage:
      deterministic_review: implemented
      next_checker_unit: null
      guardian_autofix: implemented
      rationale: generated file node と生成元 YAML の対応は tree-first facts と gen_data.py 実行で機械化できる

  - id: scene_mvp_boundary
    summary: scene は MVP 境界を越えて責務を混在させない
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - src/scenes
    evidence:
      checks:
        - inspect_scene_boundary_against_mvp_roles
    message: scene の model / view / presenter / scene の責務境界が崩れている可能性があります
    suggested_actions:
      - src/scenes 配下で model / view / presenter の責務を見直し、pyxel 描画や state 更新の置き場を整理する
      - framework-rule.md の M1-M4 と scene 実装の責務分担を照合する
    coverage:
      deterministic_review: candidate
      next_checker_unit: scene_static_boundary_checks
      guardian_autofix: not_recommended
      rationale: 既存の framework rule guard を昇格させれば pyxel 呼び出し境界と scene package 形状までは deterministic に広げられる

  - id: shared_service_vs_state_boundary
    summary: shared/services の service/state holder と shared/state の横断 model の配置が repo 方針と一致する
    severity: warning
    enforcement:
      mode: llm_assisted
    scope:
      paths:
        - src/shared/services
        - src/shared/state
    evidence:
      checks:
        - inspect_shared_boundary_with_state_holders
    message: shared/services の state holder と shared/state の横断 model の境界が崩れている可能性があります
    suggested_actions:
      - shared/services と shared/state の責務を見直し、state holder と横断 model の配置を整理する
      - architecture_rules.yml の shared facts と実ファイル配置を照合する
    coverage:
      deterministic_review: candidate
      next_checker_unit: shared_directory_role_checks
      guardian_autofix: not_recommended
      rationale: shared/services と shared/state の配置・命名・pyxel 利用禁止は static guard 化できるが、ファイル移動の autofix は安全でない

  - id: build_runbook_paths
    summary: build runbook は documented command と artifact path を維持する
    severity: warning
    enforcement:
      mode: deterministic
    scope:
      paths:
        - Makefile
        - tools/build_codemaker.py
        - tools/build_web_release.py
        - tools/build_release_artifacts.py
        - docs/architecture.md
        - docs/architecture_rules.yml
    evidence:
      checks:
        - compare_runbook_commands_and_artifact_defs
    message: build runbook fact と build script / artifact 定義がずれている可能性があります
    suggested_actions:
      - facts.runbooks の command / outputs を実在する build script と artifact path にそろえる
      - dist artifact 定義と build_release_artifacts.py / build_web_release.py の出力先を照合する
    coverage:
      deterministic_review: implemented
      next_checker_unit: null
      guardian_autofix: implemented
      rationale: runbook command と artifact path のズレは tree-first facts と build script 名で機械検査できる
