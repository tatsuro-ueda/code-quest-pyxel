<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Block Quest - えらんであそぼう</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: #fff;
  font-family: sans-serif;
  min-height: 100vh;
}
.container {
  max-width: 400px;
  margin: 0 auto;
  padding: 20px 16px;
}
h1 {
  text-align: center;
  font-size: 20px;
  margin-bottom: 24px;
}
.version-card {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.version-card h2 {
  font-size: 18px;
  margin: 0 0 8px 0;
}
.version-card .changes {
  font-size: 14px;
  color: #ccc;
  margin: 0 0 12px 0;
  padding: 0;
  list-style: none;
}
.version-card .changes li::before {
  content: "・";
}
.version-card .desc {
  font-size: 14px;
  color: #ccc;
  margin: 0 0 12px 0;
}
.play-btn {
  display: block;
  width: 100%;
  padding: 12px;
  font-size: 16px;
  font-family: sans-serif;
  background: #e2e3f1;
  color: #1a1a2e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
}
.play-btn:active {
  background: #c5c6d9;
}
.sub-link {
  display: inline-block;
  font-size: 13px;
  color: #b9c0ff;
  text-decoration: none;
}
.sub-link:hover,
.sub-link:focus {
  text-decoration: underline;
}
.sub-links {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  margin-top: 10px;
}
.secondary-btn {
  display: inline-block;
  width: 100%;
  padding: 10px 12px;
  font-size: 14px;
  font-family: sans-serif;
  background: #2f365f;
  color: #f4f6ff;
  border: 1px solid #6d79c7;
  border-radius: 8px;
  cursor: pointer;
}
.secondary-btn:disabled {
  opacity: 0.6;
  cursor: wait;
}
.import-input {
  width: 100%;
  margin: 0 0 10px 0;
  color: #ddd;
}
.import-status {
  font-size: 13px;
  color: #cfd6ff;
  margin: 10px 0 0 0;
  min-height: 1.2em;
}
.hint {
  text-align: center;
  font-size: 14px;
  color: #aaa;
  margin-top: 24px;
  line-height: 1.8;
}
.owner-link {
  text-align: center;
  font-size: 11px;
  color: #777;
  margin-top: 16px;
}
.owner-link a {
  color: #8f95d8;
  text-decoration: none;
}
.owner-link a:hover,
.owner-link a:focus {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
  <h1>ブロッククエスト</h1>

  <div class="version-card">
    <h2>開発版</h2>
    <ul class="changes">
      <li>まおうまえに おはなしが はじまる</li>
    </ul>
    <a class="play-btn" href="development/play.html?v=1776681027">あそんでみる</a>
    <div class="sub-links">
      <a class="sub-link" href="development/code-maker.zip?v=1776681027" download>リソースファイルをダウンロード</a>
      <a class="sub-link" href="https://kitao.github.io/pyxel/wasm/code-maker/" target="_blank" rel="noopener noreferrer">リソースエディタを開く</a>
    </div>
  </div>

  <div class="version-card" id="codemaker-import-panel">
    <h2>Code Maker から もどす</h2>
    <p class="desc">code-maker.zip を このブラウザに ほぞんします<br>がぞう、マップ、こうかおん、おんがくだけを とりこみます<br>プログラムは とりこみません</p>
    <input class="import-input" id="codemaker-import-input" type="file" accept=".zip,application/zip">
    <button class="secondary-btn" id="codemaker-import-button" type="button">zip を とりこむ</button>
    <p class="import-status" id="codemaker-import-status">zip を えらんでください</p>
  </div>

  <div class="version-card">
    <h2>本番</h2>
    <p class="desc">いままでと おなじ</p>
    <a class="play-btn" href="production/play.html?v=1776680933">あそんでみる</a>
  </div>

  <p class="hint">
    りょうほう あそんだら<br>
    おとうさんに おしえてね！<br>
    「こっちが いい！」って
  </p>
  <p class="owner-link">
    コード編集:
    <a id="code-server-link" href="http://127.0.0.1:8081/" target="_blank" rel="noopener noreferrer">code-server :8081</a>
  </p>
</div>
<script>
(async function () {
  var link = document.getElementById("code-server-link");
  if (!link || !window.location || !window.location.hostname) {
    return;
  }
  var protocol = window.location.protocol;
  if (protocol !== "http:" && protocol !== "https:") {
    protocol = "http:";
  }
  link.href = protocol + "//" + window.location.hostname + ":8081/";
(function () {
  var importInput = document.getElementById("codemaker-import-input");
  var importButton = document.getElementById("codemaker-import-button");
  var importStatus = document.getElementById("codemaker-import-status");
  if (!importInput || !importButton || !importStatus || !window.localStorage) {
    return;
  }

  var ZIP_STORAGE_KEY = "blockquest_codemaker_zip_v1";
  var META_STORAGE_KEY = "blockquest_codemaker_zip_meta_v1";

  function setStatus(text) {
    importStatus.textContent = text;
  }

  function loadStoredMeta() {
    var rawMeta = window.localStorage.getItem(META_STORAGE_KEY);
    if (!rawMeta) {
      return null;
    }
    try {
      return JSON.parse(rawMeta);
    } catch (error) {
      return null;
    }
  }

  function renderStoredStatus() {
    var storedMeta = loadStoredMeta();
    if (storedMeta && storedMeta.source_name) {
      setStatus("さいごに ほぞんした zip: " + storedMeta.source_name);
      return;
    }
    setStatus("zip を えらんでください");
  }

  function bytesToBase64(bytes) {
    var chunkSize = 0x8000;
    var parts = [];
    for (var index = 0; index < bytes.length; index += chunkSize) {
      var chunk = bytes.subarray(index, index + chunkSize);
      var binary = "";
      for (var chunkIndex = 0; chunkIndex < chunk.length; chunkIndex += 1) {
        binary += String.fromCharCode(chunk[chunkIndex]);
      }
      parts.push(binary);
    }
    return window.btoa(parts.join(""));
  }

  async function storeBrowserImport(file) {
    var bytes = new Uint8Array(await file.arrayBuffer());
    window.localStorage.setItem(ZIP_STORAGE_KEY, bytesToBase64(bytes));
    window.localStorage.setItem(
      META_STORAGE_KEY,
      JSON.stringify({
        source_name: file.name || "code-maker.zip",
        stored_at: new Date().toISOString()
      })
    );
  }

  renderStoredStatus();

  importButton.addEventListener("click", async function () {
    if (!importInput.files || !importInput.files.length) {
      renderStoredStatus();
      return;
    }
    var file = importInput.files[0];
    importButton.disabled = true;
    setStatus("ほぞん ちゅう...");
    try {
      await storeBrowserImport(file);
      setStatus("このブラウザに ほぞんしました。つぎに ひらくゲームで つかいます");
    } catch (error) {
      setStatus("このブラウザに ほぞんできませんでした");
    } finally {
      importButton.disabled = false;
    }
  });
})();

})();
</script>
</body>
</html>
